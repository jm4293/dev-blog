name: 블로그 게시글 자동 수집

on:
  # 6시간마다 자동 실행 (하루 4회)
  # UTC 00:17, 06:17, 12:17, 18:17 = KST 09:17, 15:17, 21:17, 03:17
  # 정각은 GitHub Actions 스케줄 혼잡 + 타 스크레이퍼와 겹쳐 Medium 429가 잦아 17분으로 오프셋
  schedule:
    - cron: '17 */6 * * *'

  # GitHub UI에서 수동 실행 가능
  workflow_dispatch:

jobs:
  fetch-posts:
    name: 블로그 게시글 수집
    runs-on: ubuntu-latest

    steps:
      # 1단계: 저장소 코드 체크아웃
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      # 2단계: Node.js 환경 설정
      - name: Node.js 20 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3단계: npm 패키지 설치
      - name: 패키지 설치
        run: npm ci

      # 4단계: 블로그 수집 스크립트 실행
      - name: 블로그 게시글 수집 실행
        run: npx tsx scripts/fetch-posts.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}

      # 5단계: 실패 시 로그 파일 업로드
      - name: 실패 시 로그 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-posts-logs
          path: |
            *.log
          retention-days: 7
