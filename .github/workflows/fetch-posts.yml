name: 블로그 게시글 자동 수집

on:
  # 6시간마다 자동 실행 (하루 4회)
  # UTC 00:17, 06:17, 12:17, 18:17 = KST 09:17, 15:17, 21:17, 03:17
  # 정각은 GitHub Actions 스케줄 혼잡 + 타 스크레이퍼와 겹쳐 Medium 429가 잦아 17분으로 오프셋
  schedule:
    - cron: '17 */6 * * *'

  # GitHub UI에서 수동 실행 가능
  workflow_dispatch:

jobs:
  fetch-posts:
    name: 블로그 게시글 수집
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      # 1단계: 저장소 코드 체크아웃
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      # 2단계: Node.js 환경 설정
      - name: Node.js 20 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3단계: npm 패키지 설치
      - name: 패키지 설치
        run: npm ci

      # 4단계: 블로그 수집 스크립트 실행
      - name: 블로그 게시글 수집 실행
        run: npx tsx scripts/fetch-posts.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}

      # 5단계: 실패 시 GitHub 이슈 생성 (같은 라벨의 열린 이슈가 있으면 중복 생성하지 않음)
      - name: 실패 시 이슈 생성
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create collection-failure --repo "$GITHUB_REPOSITORY" --color D93F0B --description "자동 수집 실패" --force
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label collection-failure --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "열린 수집 실패 이슈가 이미 있어 코멘트만 추가합니다."
            ISSUE=$(gh issue list --repo "$GITHUB_REPOSITORY" --label collection-failure --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE" --repo "$GITHUB_REPOSITORY" --body "수집이 다시 실패했습니다: $RUN_URL"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "🚨 블로그 게시글 수집 실패 ($(date -u +%Y-%m-%d))" \
              --label collection-failure \
              --body "자동 수집 워크플로우가 실패했습니다. 실행 로그에서 실패한 블로그 목록(⚠️ 수집 실패 블로그)을 확인하세요.

          실행 로그: $RUN_URL"
          fi
