name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    # 빌드·타입 검사는 Vercel 배포 파이프라인이 push마다 수행하므로 여기서는 중복하지 않는다.
    # CI는 Vercel이 하지 않는 검증(ESLint, 향후 테스트)을 담당한다.
    name: 린트 · 타입 검사
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 20 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript 타입 검사
        run: npm run type-check
