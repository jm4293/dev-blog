# SonarCloud 프로젝트 설정
sonar.projectKey=jm4293_dev-blog
sonar.organization=jm4293

# 프로젝트 정보
sonar.projectName=devBlog.kr
sonar.projectVersion=1.0

# 소스 코드 경로
sonar.sources=app,features,components,hooks,utils,lib,atoms,supabase
# sonar.tests=__tests__  # 테스트 폴더가 없으면 주석 처리

# 제외할 파일/폴더
sonar.exclusions=**/node_modules/**,**/*.spec.ts,**/*.test.ts,**/*.test.tsx,.next/**,out/**,public/**,coverage/**

# 테스트 커버리지 (선택사항)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.typescript.lcov.reportPaths=coverage/lcov.info

# 코드 중복 감지
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx
